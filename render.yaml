services:
  - type: web
    name: hisab-kitab
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install && cd ..
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5000
